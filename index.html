<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Я вас всех люблю ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#ff4d88,#8a2be2);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
}

h1{
    font-size:60px;
    margin-bottom:30px;
    text-shadow:0 0 15px rgba(255,255,255,0.7);
    animation:glow 2s infinite alternate;
    z-index:10;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff;
    }
    to{
        text-shadow:0 0 30px #fff,0 0 50px #ff99cc;
    }
}

.player{
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:20px;
    backdrop-filter:blur(10px);
    z-index:10;
}

audio{
    width:320px;
}

p{
    margin-top:15px;
    opacity:0.9;
}

/* Сердечки */

.heart{
    position:fixed;
    bottom:-100px;
    pointer-events:none;
    animation:floatUp linear infinite;
    z-index:1;
}

/* Летающие фото */

.floating-photo{
    position:fixed;
    bottom:-200px;
    width:120px;
    border-radius:15px;
    box-shadow:0 0 25px rgba(255,255,255,0.6);
    animation:floatUp linear infinite;
    pointer-events:none;
    z-index:0;
}

@keyframes floatUp{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    90%{
        opacity:1;
    }

    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>
<body>

<h1>Я вас всіх лблююю ❤️</h1>

<div class="player">
    <audio controls>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <p>🎵 пісня наречених 🎵</p>
</div>

<script>
// Сердечки
for(let i=0;i<35;i++){

    const heart=document.createElement("div");

    heart.innerHTML="❤️";
    heart.className="heart";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(20+Math.random()*40)+"px";
    heart.style.animationDuration=(6+Math.random()*10)+"s";
    heart.style.animationDelay=Math.random()*10+"s";

    document.body.appendChild(heart);
}

// Фото
for(let i=0;i<15;i++){

    const img=document.createElement("img");

  img.src="./marrypopa.png";

    img.className="floating-photo";

    img.style.left=Math.random()*100+"vw";
    img.style.animationDuration=(12+Math.random()*12)+"s";
    img.style.animationDelay=Math.random()*10+"s";

    document.body.appendChild(img);
}
</script>

</body>
</html>
